spring:
  application:
    name: EmployeeManagementSystem

  datasource :
    url : jdbc:mysql://localhost:3306/employee_management_db
    username : ${USER_NAME}
    password : ${PASSWORD}

  jpa:
    hibernate :
      ddl-auto: update
    show-sql: true

  mvc:
    cors:
      mappings:
        "[/**]":
          allowed-origins: "*"
          allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
          allowed-headers: "*"
          allow-credentials: false

  session:
    timeout: 30m          # session expires after 30 minutes of inactivity
  servlet:
    session:
      cookie:
        http-only: true
        same-site: strict
        secure: false     # set true in production with HTTPS