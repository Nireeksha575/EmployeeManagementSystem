spring:
  application:
    name: EmployeeManagementSystem

  datasource :
    url : jdbc:mysql://localhost:3306/employee_management_db
    username : ${USER_NAME}
    password : ${PASSWORD}

  jpa:
    hibernate :
      ddl-auto: update
    show-sql: true

  mvc:
    cors:
      mappings:
        "[/**]":
          allowed-origins: "*"
          allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
          allowed-headers: "*"
          allow-credentials: false

  session:
    timeout: 30m          # session expires after 30 minutes of inactivity
  servlet:
    session:
      cookie:
        http-only: true
        same-site: strict
        secure: false     # set true in production with HTTPS

  security:
    debug: true
    oauth2:
      client:
        registration:
          google:
            client-id: ${client_id}
            client-secret: ${client_secret}
            scope:
              - openid
              - profile
              - email
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
logging:
  level:
    org.springframework.security: DEBUG
    com.example.EmployeeManagementSystem: DEBUG
jwt:
  secret: ${JWT_SECRET}

